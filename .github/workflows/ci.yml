name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Build lean core (no default features)
        run: cargo build --no-default-features

      - name: Test lean core
        run: cargo test --no-default-features --lib

  promtool:
    name: promtool check generated rules
    runs-on: ubuntu-latest
    env:
      # Pinned Prometheus release providing promtool (3.5.x is the LTS line).
      PROMETHEUS_VERSION: 3.5.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install promtool
        run: |
          curl -sSfL -o prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz"
          tar -xzf prometheus.tar.gz
          echo "${PWD}/prometheus-${PROMETHEUS_VERSION}.linux-amd64" >> "$GITHUB_PATH"

      - name: Verify promtool
        run: promtool --version

      - name: Promtool-validate generated rules
        run: cargo test --test promtool
        env:
          SLOKIT_REQUIRE_PROMTOOL: "1"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
