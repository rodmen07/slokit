name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Build lean core (no default features)
        run: cargo build --no-default-features

      - name: Test lean core
        run: cargo test --no-default-features --lib

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        # --deny warnings: without it, `cargo audit` exits 0 on `unsound` and
        # `yanked` advisories, so they accumulate silently while CI stays green.
        # This commit's Cargo.lock fixes RUSTSEC-2026-0185 (quinn-proto, HIGH,
        # remote memory exhaustion, -> 0.11.16) and RUSTSEC-2026-0190 (anyhow,
        # unsound Error::downcast_mut, -> 1.0.104), so the gate starts from a
        # clean baseline; a new advisory now fails the build instead of
        # scrolling past unseen.
        run: cargo audit --deny warnings

  msrv:
    name: MSRV 1.82
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stable cargo first: its rust-version-aware resolver (1.84+) picks
      # dependency versions that honor rust-version = "1.82". Installing 1.82
      # second makes it the default toolchain for the build steps.
      - name: Install stable toolchain (MSRV-aware resolver)
        uses: dtolnay/rust-toolchain@stable

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@1.82

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-hack

      # The committed Cargo.lock tracks current dependencies, some of which
      # (clap 4.6+, the ICU4X tree) need newer rustc. Resolve an
      # MSRV-compatible graph for this job only: the fallback resolver
      # downgrades where a compatible release exists, and idna_adapter is
      # pinned to 1.1.0, the upstream-supported escape hatch that swaps the
      # ICU4X unicode backend (MSRV 1.83+) for unicode-rs.
      - name: Resolve MSRV-compatible dependencies
        run: |
          cargo +stable update
          cargo +stable update idna_adapter --precise 1.1.0
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback

      # Build-only, without dev-dependencies: `cargo hack --no-dev-deps`
      # proves the library and CLI compile on 1.82 while keeping test tooling
      # (insta, jsonschema) out of the MSRV contract.
      - name: Build (default features)
        run: cargo hack build --no-dev-deps

      - name: Build (all features)
        run: cargo hack build --no-dev-deps --all-features

      - name: Build lean core (no default features)
        run: cargo hack build --no-dev-deps --no-default-features

  promtool:
    name: promtool check generated rules
    runs-on: ubuntu-latest
    env:
      # Pinned Prometheus release providing promtool (3.5.x is the LTS line).
      PROMETHEUS_VERSION: 3.5.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install promtool
        run: |
          curl -sSfL -o prometheus.tar.gz \
            "https://github.com/prometheus/prometheus/releases/download/v${PROMETHEUS_VERSION}/prometheus-${PROMETHEUS_VERSION}.linux-amd64.tar.gz"
          tar -xzf prometheus.tar.gz
          echo "${PWD}/prometheus-${PROMETHEUS_VERSION}.linux-amd64" >> "$GITHUB_PATH"

      - name: Verify promtool
        run: promtool --version

      - name: Promtool-validate generated rules
        run: cargo test --test promtool
        env:
          SLOKIT_REQUIRE_PROMTOOL: "1"

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
