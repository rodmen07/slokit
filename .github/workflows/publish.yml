name: Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          TAG=$(git describe --tags --exact-match 2>/dev/null || echo "unknown")
          if [ "$TAG" != "v$VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $VERSION but git tag is $TAG"
            exit 1
          fi

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features

      - name: Test lean core (no default features)
        run: cargo test --no-default-features --lib

      - name: Publish to crates.io
        env:
          # The env var name is fixed by cargo itself; the SECRET it reads from
          # is CRATES_IO_TOKEN, which is the name used across all three crate
          # repos. The old CARGO_REGISTRY_TOKEN secret predates that convention
          # and went stale when the token was rotated on 2026-07-19, which
          # silently failed the v1.0.0 publish.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set +e
          output=$(cargo publish 2>&1)
          status=$?
          echo "$output"
          if [ "$status" -eq 0 ]; then
            echo "Published successfully."
          elif echo "$output" | grep -q "already exists"; then
            echo "::notice::This version is already on crates.io; skipping publish."
          else
            exit "$status"
          fi
