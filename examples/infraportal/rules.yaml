- name: slokit-slo-meta-recordings-accounts-service-requests-availability
  rules:
  - record: slo:objective:ratio
    expr: vector(0.999)
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:error_budget:ratio
    expr: vector(0.001)
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:time_period:days
    expr: vector(30)
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:current_burn_rate:ratio
    expr: |-
      slo:sli_error:ratio_rate5m{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"}
      / on(sloth_id, sloth_slo, sloth_service) group_left
      slo:error_budget:ratio{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"}
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:period_burn_rate:ratio
    expr: |-
      slo:sli_error:ratio_rate30d{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"}
      / on(sloth_id, sloth_slo, sloth_service) group_left
      slo:error_budget:ratio{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"}
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:period_error_budget_remaining:ratio
    expr: 1 - slo:period_burn_rate:ratio{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"}
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      tier: crm
  - record: slo:info
    expr: vector(1)
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_mode: cli-gen-prometheus
      sloth_objective: '99.9'
      sloth_service: accounts-service
      sloth_slo: requests-availability
      sloth_spec: prometheus/v1
      sloth_version: 1.0.0
      tier: crm
- name: slokit-slo-alerts-accounts-service-requests-availability
  rules:
  - alert: accounts-service-high-error-rate
    expr: |-
      (
        max(slo:sli_error:ratio_rate1h{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (14.4 * 0.001)) without (sloth_window)
        and
        max(slo:sli_error:ratio_rate5m{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (14.4 * 0.001)) without (sloth_window)
      )
      or
      (
        max(slo:sli_error:ratio_rate6h{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (6 * 0.001)) without (sloth_window)
        and
        max(slo:sli_error:ratio_rate30m{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (6 * 0.001)) without (sloth_window)
      )
    labels:
      service: accounts-service
      severity: page
      sloth_severity: page
    annotations:
      runbook: https://github.com/rodmen07/microservices/blob/main/monitoring/RUNBOOK.md#accounts-service
      summary: 'page burn-rate alert: SLO ''requests-availability'' on service ''accounts-service'' is consuming its error budget too fast'
  - alert: accounts-service-high-error-rate
    expr: |-
      (
        max(slo:sli_error:ratio_rate1d{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (3 * 0.001)) without (sloth_window)
        and
        max(slo:sli_error:ratio_rate2h{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (3 * 0.001)) without (sloth_window)
      )
      or
      (
        max(slo:sli_error:ratio_rate3d{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (1 * 0.001)) without (sloth_window)
        and
        max(slo:sli_error:ratio_rate6h{sloth_id="accounts-service-requests-availability", sloth_service="accounts-service", sloth_slo="requests-availability"} > (1 * 0.001)) without (sloth_window)
      )
    labels:
      service: accounts-service
      severity: ticket
      sloth_severity: ticket
    annotations:
      runbook: https://github.com/rodmen07/microservices/blob/main/monitoring/RUNBOOK.md#accounts-service
      summary: 'ticket burn-rate alert: SLO ''requests-availability'' on service ''accounts-service'' is consuming its error budget too fast'
