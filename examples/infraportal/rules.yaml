- name: slokit-slo-sli-recordings-accounts-service-requests-availability
  rules:
  - record: slo:sli_error:ratio_rate5m
    expr: |-
      (sum(rate(http_request_duration_seconds_count{job="accounts-service",code=~"5.."}[5m])))
      /
      (sum(rate(http_request_duration_seconds_count{job="accounts-service"}[5m])))
    labels:
      owner: platform
      sloth_id: accounts-service-requests-availability
      sloth_service: accounts-service
      sloth_slo: requests-availability
      sloth_window: 5m
      tier: crm
