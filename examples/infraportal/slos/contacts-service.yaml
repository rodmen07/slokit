version: "prometheus/v1"
service: contacts-service
labels:
  owner: platform
  tier: crm
slos:
  - name: requests-availability
    objective: 99.9
    period: 30d
    description: "99.9% of HTTP requests to contacts-service succeed (non-5xx)"
    sli:
      events:
        error_query: sum(rate(http_request_duration_seconds_count{job="contacts-service",code=~"5.."}[{{.window}}]))
        total_query: sum(rate(http_request_duration_seconds_count{job="contacts-service"}[{{.window}}]))
    alerting:
      name: contacts-service-high-error-rate
      annotations:
        runbook: https://github.com/rodmen07/microservices/blob/main/monitoring/RUNBOOK.md#contacts-service
      page_alert:
        labels:
          severity: page
          service: contacts-service
      ticket_alert:
        labels:
          severity: ticket
          service: contacts-service
  - name: requests-latency
    objective: 99.5
    period: 30d
    description: "99.5% of contacts-service requests are served under 300ms"
    sli:
      latency:
        histogram_metric: http_request_duration_seconds
        threshold: "0.3"
        selector: job="contacts-service"
    alerting:
      name: contacts-service-high-latency
      annotations:
        runbook: https://github.com/rodmen07/microservices/blob/main/monitoring/RUNBOOK.md#contacts-service
      page_alert:
        labels:
          severity: page
          service: contacts-service
      ticket_alert:
        labels:
          severity: ticket
          service: contacts-service
